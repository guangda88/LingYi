<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵依 — 语音聊天</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  .header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
  .header h1 { font-size: 18px; color: #e94560; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .mode-switch { display: flex; background: #0f3460; border-radius: 20px; overflow: hidden; }
  .mode-switch button { padding: 6px 14px; border: none; background: transparent; color: #888; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .mode-switch button.active { background: #e94560; color: #fff; }
  .status { font-size: 12px; color: #888; }

  .chat-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #2a2a4a; color: #e0e0e0; border-bottom-left-radius: 4px; }
  .msg.bot audio { margin-top: 8px; width: 100%; height: 32px; border-radius: 8px; }
  .msg.system { align-self: center; background: transparent; color: #888; font-size: 12px; }

  .typing { display: inline-block; }
  .typing::after { content: '...'; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

  .text-input-bar { background: #16213e; padding: 12px 20px; border-top: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; }
  .text-input-bar input[type="text"] { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
  .text-input-bar input[type="text"]:focus { border-color: #e94560; }
  .text-input-bar button { padding: 10px 18px; border-radius: 20px; border: none; cursor: pointer; font-size: 14px; }
  .btn-send { background: #e94560; color: #fff; }

  .voice-input-bar { background: #16213e; padding: 20px; border-top: 1px solid #0f3460; display: none; flex-direction: column; align-items: center; gap: 12px; }
  .voice-input-bar.active { display: flex; }
  .mic-btn-big { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #e94560; background: #1a1a2e; color: #e94560; font-size: 32px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .mic-btn-big:hover { background: #2a1a2e; }
  .mic-btn-big.recording { background: #e94560; color: #fff; animation: pulse-ring 1.5s infinite; border-color: #ff6b81; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(233,69,96,0.4); } 70% { box-shadow: 0 0 0 20px rgba(233,69,96,0); } 100% { box-shadow: 0 0 0 0 rgba(233,69,96,0); } }
  .mic-label { font-size: 13px; color: #888; }
  .mic-label.active { color: #e94560; }
</style>
</head>
<body>
<div class="header">
  <h1>灵依</h1>
  <div class="header-right">
    <div class="mode-switch">
      <button id="modeText" class="active" onclick="setMode('text')">文字</button>
      <button id="modeVoice" onclick="setMode('voice')">语音</button>
    </div>
    <span class="status" id="status">连接中...</span>
  </div>
</div>

<div class="chat-area" id="chat"></div>

<div class="text-input-bar" id="textBar">
  <input type="text" id="textInput" placeholder="输入消息..." autocomplete="off">
  <button class="btn-send" onclick="sendText()">发送</button>
</div>

<div class="voice-input-bar" id="voiceBar">
  <button class="mic-btn-big" id="micBtnBig" onclick="toggleRecording()">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <span class="mic-label" id="micLabel">点击开始说话</span>
</div>

<script>
const chat = document.getElementById('chat');
const textInput = document.getElementById('textInput');
const textBar = document.getElementById('textBar');
const voiceBar = document.getElementById('voiceBar');
const micBtnBig = document.getElementById('micBtnBig');
const micLabel = document.getElementById('micLabel');
const statusEl = document.getElementById('status');

let ws = null;
let currentMode = 'text';
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let audioStream = null;

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/chat`);
  ws.onopen = () => { statusEl.textContent = '已连接'; addMsg('system', '灵依已上线，开始聊天吧！'); };
  ws.onclose = () => { statusEl.textContent = '已断开，重连中...'; setTimeout(connect, 2000); };
  ws.onerror = () => { statusEl.textContent = '连接错误'; };
  ws.onmessage = onMessage;
}

function onMessage(e) {
  const msg = JSON.parse(e.data);
  if (msg.type === 'ping') {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send('{"type":"pong"}');
    return;
  }
  if (msg.type === 'recognized') {
    addMsg('user', msg.text);
  } else if (msg.type === 'reply') {
    removeTyping();
    const div = addMsg('bot', msg.text);
    if (msg.audio) {
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.autoplay = true;
      audio.src = `data:audio/mp3;base64,${msg.audio}`;
      audio.style.cssText = 'margin-top:8px;width:100%;height:32px;border-radius:8px;';
      div.appendChild(audio);
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {});
      }
    }
  }
}

// Mode switching
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeText').classList.toggle('active', mode === 'text');
  document.getElementById('modeVoice').classList.toggle('active', mode === 'voice');
  textBar.style.display = mode === 'text' ? 'flex' : 'none';
  voiceBar.style.display = mode === 'voice' ? 'flex' : 'none';
  if (mode === 'text' && isRecording) stopRecording();
}

// Recording
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    addMsg('system', '⚠ 无法访问麦克风: ' + err.message);
    return;
  }

  const mime = getSupportedMime();
  mediaRecorder = new MediaRecorder(audioStream, mime ? { mimeType: mime } : {});
  audioChunks = [];

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    if (audioStream) {
      audioStream.getTracks().forEach(t => t.stop());
      audioStream = null;
    }
    if (audioChunks.length > 0) {
      micLabel.textContent = '识别中...';
      sendRecordedAudio();
    }
  };

  mediaRecorder.start();
  isRecording = true;
  micBtnBig.classList.add('recording');
  micLabel.textContent = '正在录音，再次点击停止';
  micLabel.classList.add('active');
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  isRecording = false;
  micBtnBig.classList.remove('recording');
  micLabel.classList.remove('active');
}

function getSupportedMime() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
  for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
  return '';
}

async function sendRecordedAudio() {
  const blob = new Blob(audioChunks, { type: audioChunks[0].type || 'audio/webm' });
  try {
    const wavBlob = await convertToWav(blob);
    const b64 = await blobToBase64(wavBlob);
    if (ws && ws.readyState === WebSocket.OPEN) {
      showTyping();
      ws.send(JSON.stringify({ type: 'audio', data: b64 }));
    }
  } catch (err) {
    addMsg('system', '⚠ 音频处理失败: ' + err.message);
  }
  micLabel.textContent = '点击开始说话';
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function convertToWav(blob) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await blob.arrayBuffer();
  const audio = await ctx.decodeAudioData(buf);
  const pcm = audio.getChannelData(0);
  const sr = audio.sampleRate;
  const wav = new ArrayBuffer(44 + pcm.length * 2);
  const v = new DataView(wav);

  const ws = (s, o) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws('RIFF', 0); v.setUint32(4, 36 + pcm.length * 2, true); ws('WAVE', 8);
  ws('fmt ', 12); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  ws('data', 36); v.setUint32(40, pcm.length * 2, true);

  let off = 44;
  for (let i = 0; i < pcm.length; i++, off += 2) {
    const s = Math.max(-1, Math.min(1, pcm[i]));
    v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  ctx.close();
  return new Blob([wav], { type: 'audio/wav' });
}

// Chat helpers
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<span class="typing">灵依正在思考</span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function sendText() {
  const text = textInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  addMsg('user', text);
  ws.send(JSON.stringify({ type: 'text', text }));
  showTyping();
  textInput.value = '';
}

textInput.onkeydown = (e) => { if (e.key === 'Enter') sendText(); };

connect();
</script>
</body>
</html>
