<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵依 — 私人助理</title>
<style>
:root {
  --bg: #0f0f1a; --card: #1a1a2e; --card2: #222240; --border: #2a2a4a;
  --text: #e0e0e0; --dim: #888; --accent: #e94560; --accent2: #ff6b81;
  --green: #4ecca3; --yellow: #ffd93d; --blue: #6c9bff;
  --radius: 12px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

.header { background:var(--card); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
.header h1 { font-size:17px; color:var(--accent); font-weight:600; }
.header-time { font-size:12px; color:var(--dim); }

.pages { flex:1; overflow:hidden; position:relative; }
.page { position:absolute; inset:0; overflow-y:auto; padding:12px 16px; display:none; -webkit-overflow-scrolling:touch; }
.page.active { display:block; }

.nav { background:var(--card); display:flex; border-top:1px solid var(--border); flex-shrink:0; padding-bottom:var(--safe-bottom); z-index:10; overflow-x:auto; }
.nav::-webkit-scrollbar { display:none; }
.nav button { flex:1; min-width:0; background:none; border:none; color:var(--dim); font-size:10px; padding:8px 2px 6px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; transition:color .2s; white-space:nowrap; }
.nav button.active { color:var(--accent); }
.nav button svg { width:20px; height:20px; }

.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:10px; }
.card-title { font-size:13px; color:var(--dim); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.card-title span { color:var(--accent); font-size:12px; cursor:pointer; }
.card-clickable { cursor:pointer; transition:border-color .2s; }
.card-clickable:hover { border-color:var(--accent); }

.sched-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.sched-item:last-child { border:none; }
.sched-slot { background:var(--accent); color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; white-space:nowrap; }
.sched-slot.pm { background:var(--blue); }
.sched-slot.eve { background:var(--yellow); color:#333; }
.sched-desc { font-size:13px; flex:1; }

.memo-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.memo-item:last-child { border:none; }
.memo-text { font-size:13px; flex:1; line-height:1.4; }
.memo-time { font-size:11px; color:var(--dim); white-space:nowrap; }
.memo-del { color:var(--dim); font-size:16px; cursor:pointer; padding:0 4px; }
.memo-del:hover { color:var(--accent); }

.ling-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
.ling-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ling-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); }
.ling-dot.off { background:#555; }
.ling-name { font-size:13px; width:60px; }
.ling-detail { font-size:12px; color:var(--dim); }

.proj-item { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--border); }
.proj-item:last-child { border:none; }
.proj-pri { font-size:10px; padding:1px 6px; border-radius:8px; font-weight:600; }
.proj-pri.P0 { background:#ff4444; color:#fff; }
.proj-pri.P1 { background:#ff8800; color:#fff; }
.proj-pri.P2 { background:var(--blue); color:#fff; }
.proj-pri.P3 { background:#555; color:#ccc; }
.proj-name { font-size:13px; flex:1; }
.proj-alias { font-size:12px; color:var(--dim); }
.live-card { background:var(--card); border-radius:12px; padding:12px 14px; margin-bottom:10px; border:1px solid var(--border); }
.live-card:hover { border-color:var(--accent); }
.live-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.live-name { font-size:15px; font-weight:600; }
.live-alias { font-size:12px; color:var(--dim); }
.live-tag { font-size:10px; padding:2px 6px; border-radius:8px; font-weight:600; }
.live-tag.active { background:#22c55e22; color:#22c55e; }
.live-tag.maintenance { background:#f59e0b22; color:#f59e0b; }
.live-tag.paused { background:#6b728022; color:#9ca3af; }
.live-tag.archived { background:#37415122; color:#6b7280; }
.live-desc { font-size:12px; color:var(--dim); margin-bottom:8px; }
.live-git { display:flex; flex-wrap:wrap; gap:6px 14px; font-size:11px; color:var(--dim); margin-bottom:6px; }
.live-git b { color:var(--text); font-weight:500; }
.live-commit { font-size:11px; color:var(--dim); background:var(--card2); border-radius:6px; padding:4px 8px; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.live-dots { display:flex; gap:2px; }
.live-dot { width:6px; height:6px; border-radius:50%; }
.live-dot.on { background:#22c55e; }
.live-dot.off { background:#374151; }
.live-disc { font-size:11px; color:var(--dim); }
.live-disc span { margin-right:10px; }
.live-section { font-size:13px; font-weight:600; margin:16px 0 8px 0; padding-bottom:4px; border-bottom:1px solid var(--border); }
.live-section .count { font-weight:400; color:var(--dim); font-size:11px; margin-left:4px; }
.live-dirty { color:#f59e0b; font-size:10px; margin-left:4px; }

.quick-bar { display:flex; gap:6px; padding:6px 0; overflow-x:auto; flex-shrink:0; }
.quick-bar::-webkit-scrollbar { display:none; }
.qbtn { flex-shrink:0; background:var(--card2); color:var(--text); border:1px solid var(--border); border-radius:16px; padding:5px 12px; font-size:12px; cursor:pointer; white-space:nowrap; }
.qbtn:hover { border-color:var(--accent); color:var(--accent); }

.session-header { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; }
.session-toggle { background:var(--card2); border:1px solid var(--border); border-radius:8px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.session-toggle:hover { border-color:var(--accent); }
.session-title { flex:1; font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.session-new { background:var(--accent); color:#fff; border:none; border-radius:8px; width:32px; height:32px; font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.session-new:hover { background:var(--accent2); }
.session-panel { background:var(--card); border-bottom:1px solid var(--border); max-height:200px; overflow-y:auto; flex-shrink:0; }
.session-panel::-webkit-scrollbar { width:4px; }
.session-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.session-list { padding:8px; }
.session-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; cursor:pointer; transition:background .2s; }
.session-item:hover { background:var(--card2); }
.session-item.active { background:var(--accent); color:#fff; }
.session-item.active .session-item-title { color:#fff; }
.session-item.active .session-item-meta { color:rgba(255,255,255,0.7); }
.session-item-title { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.session-item-meta { font-size:11px; color:var(--dim); }
.session-item-del { color:var(--dim); font-size:16px; cursor:pointer; padding:4px; }
.session-item-del:hover { color:#ff4444; }
.session-loading { text-align:center; padding:20px; color:var(--dim); font-size:13px; }
.session-date-group { margin-top:4px; }
.session-date-label { font-size:11px; color:var(--dim); padding:4px 10px 2px; display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; }
.session-date-label:hover { color:var(--text); }
.session-date-label .arrow { transition:transform .2s; font-size:10px; }
.session-date-label .arrow.collapsed { transform:rotate(-90deg); }
.session-date-items { overflow:hidden; transition:max-height .25s ease; }
.session-date-items.collapsed { max-height:0 !important; }

.chat-area { flex:1; overflow-y:auto; padding:8px 16px; display:flex; flex-direction:column; gap:8px; -webkit-overflow-scrolling:touch; }
.msg-container { position:relative; max-width:85%; display:flex; flex-direction:column; }
.msg-container.user { align-self:flex-end; }
.msg-container.bot { align-self:flex-start; }
.msg { padding:8px 12px; border-radius:12px; line-height:1.5; font-size:14px; word-break:break-word; }
.msg.user { background:#0f3460; color:#fff; border-bottom-right-radius:4px; }
.msg.bot { background:var(--card2); color:var(--text); border-bottom-left-radius:4px; white-space:pre-wrap; }
.msg.bot audio { margin-top:6px; width:100%; height:28px; }
.msg.system { align-self:center; background:none; color:var(--dim); font-size:12px; }
.msg-actions { display:flex; gap:4px; opacity:0; transition:opacity .2s; }
.msg-container:hover .msg-actions { opacity:1; }
.msg-action-btn { background:none; border:none; color:var(--dim); font-size:14px; cursor:pointer; padding:2px 4px; border-radius:4px; transition:all .2s; }
.msg-action-btn:hover { background:var(--card2); color:var(--text); }
.msg-action-btn.delete:hover { color:#ff4444; }
.msg.collapsed { max-height:60px; overflow:hidden; position:relative; }
.msg.collapsed::after { content:''; position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(transparent, var(--card2)); }
.date-divider { text-align:center; padding:8px 0; cursor:pointer; user-select:none; transition:opacity .2s; }
.date-divider:hover { opacity:0.7; }
.date-divider-text { display:inline-block; background:var(--card); color:var(--dim); font-size:12px; padding:4px 12px; border-radius:12px; border:1px solid var(--border); }
.date-divider.collapsed .date-divider-text { background:var(--accent); color:#fff; border-color:var(--accent); }
.date-group { display:flex; flex-direction:column; gap:8px; }
.date-group.collapsed { display:none; }
.typing::after { content:'...'; animation:dots 1.2s steps(4,end) infinite; }
@keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

.input-bar { background:var(--card); padding:8px 12px; border-top:1px solid var(--border); display:flex; gap:6px; align-items:center; flex-shrink:0; padding-bottom:calc(8px + var(--safe-bottom)); }
.input-bar input { flex:1; padding:14px 16px; border-radius:24px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:16px; outline:none; line-height:1.5; min-height:48px; }
.input-bar input:focus { border-color:var(--accent); }
.send-btn { background:var(--accent); color:#fff; border:none; width:44px; height:44px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.send-btn svg { width:20px; height:20px; fill:#fff; }

.disc-item { display:flex; flex-direction:column; gap:4px; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.disc-item:last-child { border:none; }
.disc-item:hover { opacity:0.85; }
.disc-topic { font-size:14px; font-weight:500; line-height:1.4; }
.disc-meta { display:flex; gap:8px; font-size:11px; color:var(--dim); align-items:center; }
.disc-badge { font-size:10px; padding:1px 6px; border-radius:8px; background:var(--card2); color:var(--accent); }
.disc-participants { font-size:11px; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.disc-detail-msg { padding:10px 0; border-bottom:1px solid var(--border); }
.disc-detail-msg:last-child { border:none; }
.disc-msg-header { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.disc-msg-sender { font-size:12px; font-weight:600; color:var(--accent2); }
.disc-msg-time { font-size:10px; color:var(--dim); }
.disc-msg-type { font-size:10px; padding:1px 5px; border-radius:6px; background:var(--card2); color:var(--dim); }
.disc-msg-body { font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }

.back-btn { display:inline-flex; align-items:center; gap:4px; color:var(--accent); font-size:13px; cursor:pointer; padding:6px 0; margin-bottom:8px; }
.back-btn:hover { text-decoration:underline; }

.new-disc-bar { display:flex; gap:6px; margin-bottom:12px; }
.new-disc-bar input { flex:1; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none; }
.new-disc-bar input:focus { border-color:var(--accent); }
.new-disc-bar button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; white-space:nowrap; }

.desktop-tabs { display:none; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; gap:0; overflow-x:auto; }
.desktop-tabs::-webkit-scrollbar { display:none; }
.desktop-tabs button { background:none; border:none; border-bottom:2px solid transparent; color:var(--dim); font-size:13px; padding:10px 14px; cursor:pointer; white-space:nowrap; transition:color .2s, border-color .2s; }
.desktop-tabs button.active { color:var(--accent); border-bottom-color:var(--accent); }
.desktop-tabs button:hover { color:var(--text); }

@media (min-width:768px) {
  .pages { display:flex; }
  .page { position:static; flex:1; display:none !important; }
  .page.active { display:block !important; }
  #pgChat.active { display:flex !important; flex-direction:column; border-left:1px solid var(--border); }
  .nav { display:none; }
  .header { display:none; }
  .desktop-tabs { display:flex; }
}

.add-row { display:flex; gap:6px; margin-top:8px; }
.add-row input { flex:1; padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none; }
.add-row button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; }

.empty { text-align:center; padding:20px; color:var(--dim); font-size:13px; }
.loading { text-align:center; padding:20px; color:var(--dim); }

.voice-bar { position:relative; display:flex; align-items:center; gap:4px; }
.mic-btn { background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer; padding:4px 6px; border-radius:50%; transition:all .2s; }
.mic-btn:hover { color:var(--accent); }
.mic-btn.recording { color:#f44; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.set-btn { background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer; padding:4px 6px; }
.set-btn:hover { color:var(--accent); }
.settings-dropdown { display:none; position:absolute; bottom:52px; right:0; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; box-shadow:0 4px 20px rgba(0,0,0,.15); z-index:100; min-width:180px; }
.settings-dropdown.show { display:block; }
.settings-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-size:13px; color:var(--text); }
.settings-row + .settings-row { border-top:1px solid var(--border); padding-top:8px; margin-top:4px; }
.settings-row span { display:flex; align-items:center; gap:6px; }
.toggle { position:relative; width:40px; height:22px; background:#ccc; border-radius:11px; cursor:pointer; transition:background .2s; flex-shrink:0; }
.toggle.on { background:var(--accent); }
.toggle::after { content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:transform .2s; }
.toggle.on::after { transform:translateX(18px); }

.mail-item { display:flex; flex-direction:column; gap:4px; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.mail-item:last-child { border:none; }
.mail-item:hover { opacity:0.85; }
.mail-from { font-size:13px; font-weight:600; color:var(--accent2); }
.mail-topic { font-size:14px; font-weight:500; line-height:1.4; }
.mail-preview { font-size:12px; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mail-time { font-size:11px; color:var(--dim); }
.mail-meta { display:flex; gap:8px; font-size:11px; color:var(--dim); align-items:center; }
.mail-compose-bar { display:flex; flex-direction:column; gap:8px; }
.mail-compose-bar input, .mail-compose-bar textarea { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; outline:none; font-family:inherit; }
.mail-compose-bar input:focus, .mail-compose-bar textarea:focus { border-color:var(--accent); }
.mail-compose-bar textarea { min-height:120px; resize:vertical; }
.mail-compose-actions { display:flex; gap:8px; justify-content:flex-end; }
.mail-compose-actions button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer; }
.mail-compose-actions button.secondary { background:var(--card2); color:var(--text); border:1px solid var(--border); }
</style>
</head>
<body>

<div id="jsError" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#ff4444;color:#fff;padding:8px 12px;font-size:12px"></div>

<div class="header">
  <h1>灵依</h1>
  <span class="header-time" id="headerTime"></span>
</div>

<div class="desktop-tabs">
  <button class="active" onclick="switchPage('Home')">首页</button>
  <button onclick="switchPage('Council')">议事厅</button>
  <button onclick="switchPage('Chat')">对话</button>
  <button onclick="switchPage('Sched')">日程</button>
  <button onclick="switchPage('Memo')">备忘</button>
  <button onclick="switchPage('Projects')">项目</button>
  <button onclick="switchPage('Logs')">日志</button>
  <button onclick="switchPage('Mail')">灵信</button>
  <button onclick="switchPage('Models')">模型</button>
</div>

<div class="pages">
  <div class="page active" id="pgHome"></div>

  <div class="page" id="pgCouncil">
    <div id="councilList"></div>
    <div id="councilDetail" style="display:none"></div>
  </div>

  <div class="page" id="pgChat">
    <div class="session-header">
      <button class="session-toggle" onclick="toggleSessionPanel()" title="会话管理">💬</button>
      <div class="session-title" id="sessionTitle">新对话</div>
      <button class="session-new" onclick="createSession()" title="新建会话">+</button>
    </div>
    <div class="session-panel" id="sessionPanel" style="display:none;">
      <div style="display:flex;justify-content:flex-end;padding:4px 8px;border-bottom:1px solid var(--border)">
        <button onclick="cleanupSessions()" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--dim);font-size:11px;cursor:pointer">清理空会话</button>
      </div>
      <div class="session-list" id="sessionList">
        <div class="session-loading">加载中...</div>
      </div>
    </div>
    <div class="quick-bar">
      <button class="qbtn" onclick="sendQuick('备忘')">备忘</button>
      <button class="qbtn" onclick="sendQuick('今天安排')">今天安排</button>
      <button class="qbtn" onclick="sendQuick('本周安排')">本周安排</button>
      <button class="qbtn" onclick="sendQuick('项目状态')">项目</button>
      <button class="qbtn" onclick="sendQuick('情报')">情报</button>
      <button class="qbtn" onclick="sendQuick('灵信')">灵信</button>
      <button class="qbtn" onclick="sendQuick('智能提醒')">提醒</button>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-bar">
      <div class="voice-bar">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="按住说话" style="display:none">&#127908;</button>
        <input type="text" id="chatInput" placeholder="跟灵依说..." autocomplete="off">
        <button class="send-btn" onclick="sendText()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
        <button class="set-btn" onclick="toggleSettings()" title="语音设置">&#9881;</button>
        <div class="settings-dropdown" id="settingsDrop">
          <div class="settings-row"><span>&#128264; 语音回复</span><div class="toggle on" id="togTTS" onclick="toggleSetting('tts')"></div></div>
          <div class="settings-row"><span>&#127908; 语音输入</span><div class="toggle" id="togSTT" onclick="toggleSetting('stt')"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="pgSched"></div>

  <div class="page" id="pgMemo"></div>

  <div class="page" id="pgProjects"></div>

  <div class="page" id="pgMail">
    <div id="mailList"></div>
    <div id="mailDetail" style="display:none"></div>
    <div id="mailCompose" style="display:none"></div>
  </div>

  <div class="page" id="pgLogs">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <select id="logSource" onchange="loadLogs()" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px"></select>
      <button onclick="loadLogs()" style="padding:6px 12px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer">刷新</button>

<script>
window.onerror = function(msg, url, line, col, err) {
  var el = document.getElementById('jsError');
  if (el) el.style.display = 'block';
  if (el) el.textContent = 'JS错误: ' + msg + ' (行' + line + ')';
  console.error('JS Error:', msg, url, line, col, err);
  return false;
};

var _ttsOn = localStorage.getItem('lingyi_tts') !== 'false';
var _sttOn = localStorage.getItem('lingyi_stt') === 'true';

function toggleSettings() {
  document.getElementById('settingsDrop').classList.toggle('show');
}
function toggleSetting(key) {
  if (key === 'tts') { _ttsOn = !_ttsOn; localStorage.setItem('lingyi_tts', _ttsOn); }
  if (key === 'stt') { _sttOn = !_sttOn; localStorage.setItem('lingyi_stt', _sttOn); }
  applySettings();
}
function applySettings() {
  var tt = document.getElementById('togTTS');
  var ts = document.getElementById('togSTT');
  var mb = document.getElementById('micBtn');
  if (tt) { tt.classList.toggle('on', _ttsOn); }
  if (ts) { ts.classList.toggle('on', _sttOn); }
  if (mb) { mb.style.display = _sttOn ? 'inline-block' : 'none'; }
}
document.addEventListener('click', function(e) {
  var dd = document.getElementById('settingsDrop');
  if (dd && dd.classList.contains('show') && !e.target.closest('.voice-bar')) dd.classList.remove('show');
});
applySettings();

const WS_PROTO = location.protocol === 'https:' ? 'wss' : 'ws';
let ws = null;
let useBridge = false;
let currentPage = 'Home';
let _discussions = [];

let _authToken = '';
const _NAME_MAP = {
  lingflow:'灵通', lingclaude:'灵克', lingzhi:'灵知',
  lingyi:'灵依', lingtongask:'灵通问道', lingterm:'灵犀',
  lingminopt:'灵极优', lingresearch:'灵研', zhibridge:'智桥',
  lingyang:'灵扬', guangda:'广大老师',
};
function memberName(id) { return _NAME_MAP[id] || id; }

function getCookie(name) {
  try {
    var m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()\[\]\/+^])/g, '\\$1') + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  } catch(e) { return ''; }
}

async function authFetch(url, opts) {
  opts = opts || {};
  try {
    var r = await fetch(url, opts);
    if (r.status === 401) { location.href = '/login'; return null; }
    return r;
  } catch(e) {
    console.error('authFetch error:', url, e);
    return null;
  }
}

// ── Navigation ──────────────────────────────────────────
function switchPage(name) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.desktop-tabs button').forEach(function(b) { b.classList.remove('active'); });
  var pg = document.getElementById('pg' + name);
  var nav = document.getElementById('nav' + name);
  var dtabs = document.querySelector('.desktop-tabs');
  var dtab = dtabs ? dtabs.querySelector('[onclick="switchPage(\'' + name + '\')"]') : null;
  if (pg) pg.classList.add('active');
  if (nav) nav.classList.add('active');
  if (dtab) dtab.classList.add('active');
  if (name === 'Home') loadDashboard();
  if (name === 'Council') loadCouncil();
  if (name === 'Sched') loadSchedules();
  if (name === 'Memo') loadMemos();
  if (name === 'Projects') loadProjects();
  if (name === 'Logs') loadLogs();
  if (name === 'Models') loadModels();
  if (name === 'Mail') loadMail();
}

// ── Dashboard ───────────────────────────────────────────
async function loadDashboard() {
  try {
    const r = await authFetch('/api/dashboard');
    if (!r) return;
    const d = await r.json();
    const pg = document.getElementById('pgHome');
    let html = '';
    const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
    const dt = new Date(d.date);
    html += '<div style="text-align:center;padding:8px 0 12px"><div style="font-size:22px;font-weight:700">' + (dt.getMonth()+1) + '月' + dt.getDate() + '日 ' + dayNames[dt.getDay()] + '</div></div>';

    // Today schedule — clickable to Sched page
    html += '<div class="card card-clickable" onclick="switchPage(\'Sched\')"><div class="card-title">今日安排 <span>全部 &gt;</span></div>';
    if (d.today_schedules.length === 0) {
      html += '<div class="empty">今天没有安排</div>';
    } else {
      d.today_schedules.forEach(function(s) {
        const cls = s.slot === '上午' ? '' : s.slot === '下午' ? ' pm' : ' eve';
        html += '<div class="sched-item"><span class="sched-slot' + cls + '">' + s.slot + '</span><span class="sched-desc">' + esc(s.description) + '</span></div>';
      });
    }
    html += '</div>';

    // Ling family
    html += '<div class="card"><div class="card-title">灵字辈</div>';
    d.ling_family.forEach(function(l) {
      html += '<div class="ling-row"><span class="ling-dot ' + (l.online?'on':'off') + '"></span><span class="ling-name">' + esc(l.name) + '</span><span class="ling-detail">' + esc(l.detail) + '</span></div>';
    });
    html += '</div>';

    // Council quick entry
    html += '<div class="card card-clickable" onclick="switchPage(\'Council\')"><div class="card-title">议事厅 <span>进入 &gt;</span></div>';
    html += '<div style="font-size:12px;color:var(--dim)">灵字辈家族讨论空间 — 点击进入议事厅</div>';
    html += '</div>';

    // Recent memos — clickable to Memo page
    html += '<div class="card card-clickable" onclick="switchPage(\'Memo\')"><div class="card-title">最近备忘 <span>全部 &gt;</span></div>';
    if (d.recent_memos.length === 0) {
      html += '<div class="empty">暂无备忘</div>';
    } else {
      d.recent_memos.forEach(function(m) {
        const t = m.time ? m.time.slice(5,16).replace('T',' ') : '';
        html += '<div class="memo-item"><span class="memo-text">' + esc(m.content) + '</span><span class="memo-time">' + t + '</span></div>';
      });
    }
    html += '</div>';

    // Active projects — clickable to Projects page
    html += '<div class="card card-clickable" onclick="switchPage(\'Projects\')"><div class="card-title">活跃项目 <span>全部 &gt;</span></div>';
    d.active_projects.forEach(function(p) {
      html += '<div class="proj-item"><span class="proj-pri ' + p.priority + '">' + p.priority + '</span><span class="proj-name">' + esc(p.name) + '</span><span class="proj-alias">' + esc(p.alias) + '</span><span style="font-size:11px;color:var(--dim)">' + esc(p.description||'') + '</span></div>';
    });
    html += '</div>';

    pg.innerHTML = html;
  } catch(e) {
    document.getElementById('pgHome').innerHTML = '<div class="empty">加载失败，请检查灵依服务是否运行</div>';
  }
}

// ── Council (议事厅 / 灵信讨论) ─────────────────────────
async function loadCouncil() {
  var listEl = document.getElementById('councilList');
  var detailEl = document.getElementById('councilDetail');
  listEl.style.display = '';
  detailEl.style.display = 'none';

  listEl.innerHTML = '<div class="loading">加载议事厅...</div>';
  try {
    var r = await authFetch('/api/lingmessage?status=open');
    if (!r) return;
    _discussions = await r.json();

    var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><h2 style="font-size:18px;font-weight:600">🏛️ 议事厅</h2>';
    html += '<span style="font-size:12px;color:var(--dim)">' + _discussions.length + ' 个讨论</span></div>';

    html += '<div class="new-disc-bar"><input type="text" id="newDiscTopic" placeholder="发起新议题..."><button onclick="newDiscussion()">发起</button></div>';

    if (_discussions.length === 0) {
      html += '<div class="empty">暂无讨论</div>';
    } else {
      _discussions.forEach(function(d, i) {
        html += '<div class="disc-item" onclick="showDiscDetail(\'' + esc(d.id) + '\')">';
        html += '<div class="disc-topic">' + esc(d.topic) + '</div>';
        html += '<div class="disc-meta">';
        html += '<span class="disc-badge">' + d.message_count + ' 条</span>';
        if (d.initiator_name || d.initiator) html += '<span>' + esc(d.initiator_name || memberName(d.initiator)) + ' 发起</span>';
        var t = d.updated_at || d.created_at || '';
        if (t) html += '<span>' + t.slice(5,16).replace('T',' ') + '</span>';
        html += '</div>';
        if (d.participants && d.participants.length) {
          html += '<div class="disc-participants">' + esc(d.participants.map(function(p){return memberName(p);}).join(' · ')) + '</div>';
        }
        html += '</div>';
      });
    }
    listEl.innerHTML = html;
  } catch(e) {
    listEl.innerHTML = '<div class="empty">加载失败</div>';
  }
}

async function showDiscDetail(discId) {
  var listEl = document.getElementById('councilList');
  var detailEl = document.getElementById('councilDetail');
  listEl.style.display = 'none';
  detailEl.style.display = '';
  detailEl.innerHTML = '<div class="loading">加载讨论...</div>';

  try {
    var r = await authFetch('/api/lingmessage/' + encodeURIComponent(discId));
    if (!r) return;
    var disc = await r.json();

    var html = '<div class="back-btn" onclick="loadCouncil()">← 返回议事厅</div>';
    html += '<h2 style="font-size:16px;font-weight:600;margin-bottom:4px;line-height:1.4">' + esc(disc.topic) + '</h2>';
    html += '<div style="font-size:11px;color:var(--dim);margin-bottom:12px">';
    if (disc.initiator_name || disc.initiator) html += esc(disc.initiator_name || disc.initiator) + ' 发起 · ';
    if (disc.participants) html += esc(disc.participants.map(function(p){return memberName(p);}).join(' · '));
    html += ' · ' + (disc.message_count || (disc.messages||[]).length) + ' 条消息';
    html += '</div>';

    var msgs = disc.messages || [];
    msgs.forEach(function(m) {
      html += '<div class="disc-detail-msg">';
      html += '<div class="disc-msg-header">';
      html += '<span class="disc-msg-sender">' + esc(m.from_name || m.sender || m.from || '') + '</span>';
      html += '<span class="disc-msg-type">' + esc(m.source_type || m.type || '') + '</span>';
      var mt = m.timestamp || m.created_at || m.time || '';
      if (mt) html += '<span class="disc-msg-time">' + mt.slice(0,19).replace('T',' ') + '</span>';
      html += '</div>';
      html += '<div class="disc-msg-body">' + esc(m.content || m.body || m.text || '') + '</div>';
      html += '</div>';
    });

    if (msgs.length === 0) {
      html += '<div class="empty">暂无消息</div>';
    }

    // Reply bar
    html += '<div class="new-disc-bar" style="margin-top:12px"><input type="text" id="discReply" placeholder="回复此讨论..."><button onclick="replyDiscussion(\'' + esc(discId) + '\',\'' + esc(disc.topic).replace(/'/g, "\\'") + '\')">发送</button></div>';

    detailEl.innerHTML = html;
    detailEl.scrollTop = detailEl.scrollHeight;
  } catch(e) {
    detailEl.innerHTML = '<div class="back-btn" onclick="loadCouncil()">← 返回议事厅</div><div class="empty">加载失败</div>';
  }
}

async function newDiscussion() {
  var inp = document.getElementById('newDiscTopic');
  var topic = inp.value.trim();
  if (!topic) return;
  inp.value = '';
  try {
    await authFetch('/api/lingmessage/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({topic: topic, content: '发起讨论：' + topic, from_id: 'guangda'})
    });
    loadCouncil();
  } catch(e) {}
}

async function replyDiscussion(discId, topic) {
  var inp = document.getElementById('discReply');
  var content = inp.value.trim();
  if (!content) return;
  inp.value = '';
  try {
    await authFetch('/api/lingmessage/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({topic: topic, content: content, from_id: 'guangda'})
    });
    showDiscDetail(discId);
  } catch(e) {}
}

// ── Mail (灵信邮箱) ──────────────────────────────────────
var _mailList = [];

  var listEl = document.getElementById('mailList');
  var detailEl = document.getElementById('mailDetail');
  var composeEl = document.getElementById('mailCompose');
  listEl.style.display = '';
  detailEl.style.display = 'none';
  composeEl.style.display = 'none';

  listEl.innerHTML = '<div class="loading">加载灵信...</div>';

    var r = await authFetch('/api/lingmessage?status=open');

    var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';

    html += '<div style="display:flex;gap:6px">';
    html += '<button onclick="composeMail()" style="padding:6px 12px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;cursor:pointer">写信</button>';
    html += '<span style="font-size:12px;color:var(--dim);align-self:center">' + _mailList.length + ' 封</span>';

        html += '<div style="display:flex;justify-content:space-between;align-items:center">';
        html += '<span class="mail-from">' + (unread ? '📩 ' : '📤 ') + esc(initiator) + '</span>';
        html += '<span class="mail-time">' + (d.updated_at || d.created_at || '').slice(5,16).replace('T',' ') + '</span>';
        html += '</div>';
        html += '<div class="mail-topic">' + esc(d.topic) + '</div>';
        html += '<div class="mail-meta"><span>' + d.message_count + ' 条</span>';
        if (d.participants && d.participants.length) {
          html += '<span>' + esc(d.participants.map(function(p){return memberName(p);}).join(' · ')) + '</span>';
        }
        html += '</div>';
        html += '<div class="mail-preview">' + esc(lastMsg) + '</div>';
        html += '</div>';
      });
    }
    listEl.innerHTML = html;
  } catch(e) {
    listEl.innerHTML = '<div class="empty">加载失败</div>';
  }
}

async function showMailDetail(discId) {
  var listEl = document.getElementById('mailList');
  var detailEl = document.getElementById('mailDetail');

  listEl.style.display = 'none';
  composeEl.style.display = 'none';

    html += esc(disc.initiator_name || disc.initiator || '') + ' 发起';
    if (disc.participants && disc.participants.length) {
      html += ' · ' + esc(disc.participants.map(function(p){return memberName(p);}).join(' · '));
    }
    html += ' · ' + (disc.message_count || (disc.messages||[]).length) + ' 条消息';
    html += '</div>';

    var msgs = disc.messages || [];

var _STATUS_CN = {active:'活跃', maintenance:'维护', paused:'暂停', archived:'归档'};
var _CAT_CN = {core:'核心', knowledge:'知识', tool:'工具', content:'内容', research:'研究', infra:'基础设施', app:'应用'};
var _PRI_CN = {P0:'紧急', P1:'高', P2:'中', P3:'低'};

async function loadProjects() {
  var pg = document.getElementById('pgProjects');
  pg.innerHTML = '<div class="empty">加载中...</div>';
  try {
    const r = await authFetch('/api/projects/live');
    if (!r) return;
    const projects = await r.json();

    var groups = {};
    ['active','maintenance','paused','archived'].forEach(function(s) { groups[s] = []; });
    projects.forEach(function(p) { (groups[p.status] || groups.archived).push(p); });

    var html = '';
    ['active','maintenance','paused','archived'].forEach(function(status) {
      var list = groups[status];
      if (!list.length) return;
      html += '<div class="live-section">' + _STATUS_CN[status] + '<span class="count">(' + list.length + ')</span></div>';
      list.forEach(function(p) {
        var g = p.git || {};
        html += '<div class="live-card">';

        // header: name + alias + priority + status
        html += '<div class="live-head">';
        html += '<span class="proj-pri ' + (p.priority||'P3') + '">' + (p.priority||'P3') + '</span>';
        html += '<span class="live-name">' + esc(p.name) + '</span>';
        if (p.alias) html += '<span class="live-alias">' + esc(p.alias) + '</span>';
        html += '<span class="live-tag ' + status + '">' + _STATUS_CN[status] + '</span>';
        html += '</div>';

        // description
        if (p.description) html += '<div class="live-desc">' + esc(p.description) + '</div>';

        // git info
        if (g.repo_found) {
          html += '<div class="live-git">';
          if (g.branch) html += '<span><b>' + esc(g.branch) + '</b></span>';
          if (g.tag) html += '<span>标签 <b>' + esc(g.tag) + '</b></span>';
          else if (p.version) html += '<span>版本 <b>' + esc(p.version) + '</b></span>';
          if (g.last_commit_time) html += '<span>' + esc(g.last_commit_time) + '</span>';

          // week activity dots (7 squares)
          if (g.week_commits !== undefined) {
            html += '<span>近7天 ';
            var n = Math.min(g.week_commits || 0, 7);
            html += '<span class="live-dots">';
            for (var i = 0; i < 7; i++) html += '<span class="live-dot ' + (i < n ? 'on' : 'off') + '"></span>';

          html += '</div>';

          if (g.last_commit) html += '<div class="live-commit">' + esc(g.last_commit) + '</div>';

          html += '<div class="live-git"><span style="color:#6b7280">无本地仓库</span>';

// ── Chat WebSocket ──────────────────────────────────────
var _wsRetryCount = 0;
var _wsMaxRetries = 10;
var _currentSessionId = 'default';
var _lastMsgDate = null;
var _currentDateGroup = null;
function connectWS() {
  _authToken = getCookie('lingyi_token');
  if (!_authToken) {
    _wsRetryCount++;
    if (_wsRetryCount <= _wsMaxRetries) {
      setTimeout(connectWS, 3000);
    } else {
      if (document.getElementById('pgChat')) {
        addChatMsg('system', '⚠️ 未登录，3秒后自动跳转到登录页...');
        setTimeout(function() { location.href = '/login'; }, 3000);
      }
    }
    return;
  }
  _wsRetryCount = 0;
  var directUrl = WS_PROTO + '://' + location.host + '/ws/chat?session_id=' + encodeURIComponent(_currentSessionId);
  ws = new WebSocket(directUrl);
  useBridge = false;
  ws.onopen = function() { _wsRetryCount = 0; addChatMsg('system', '灵依已连线 ✓'); };
  ws.onclose = function(ev) {
    var reason = ev.reason || '';
    if (ev.code === 4001 || reason === 'unauthorized') {
      addChatMsg('system', '⚠️ 登录已过期，请刷新页面重新登录');
      return;
    }
    _wsRetryCount++;
    if (_wsRetryCount <= 3) addChatMsg('system', '连线断开，重连中...（第' + _wsRetryCount + '次）');
    if (_wsRetryCount > _wsMaxRetries) {
      addChatMsg('system', '❌ 无法连线服务器，请检查网络后刷新页面');
      return;
    }
    setTimeout(connectWS, 5000);
  };
  ws.onerror = function(ev) {
    console.error('WebSocket error:', ev);
    addChatMsg('system', '⚠️ 连线出错，正在尝试重连...');
  };
  ws.onmessage = onDirectMsg;
}

function onBridgeMsg(e) {
  var msg = JSON.parse(e.data);
  if (msg.type === 'ping' || msg.type === 'pong') return;
  if (msg.type === 'backends_list') { console.log('可用AI后端:', msg.backends); return; }
  if (msg.type === 'push') { handlePush(msg); return; }
  if (msg.type === 'reply') { handleReply(msg); return; }
  if (msg.type === 'error') { removeTyping(); addChatMsg('system', '错误: ' + msg.message); }
}

function onDirectMsg(e) {
  var msg = JSON.parse(e.data);
  if (msg.type === 'ping') { if (ws && ws.readyState === 1) ws.send('{"type":"pong"}'); return; }
  if (msg.type === 'session_joined') {
    _currentSessionId = msg.session_id;
    loadSessions();
    return;
  }
  if (msg.type === 'session_switched') {
    _currentSessionId = msg.session_id;
    loadSessions();
    var area = document.getElementById('chatArea');
    area.innerHTML = '';
    _lastMsgDate = null;
    _currentDateGroup = null;
    var sortedMsgs = msg.messages.sort(function(a, b) {
      return new Date(a.created_at || 0) - new Date(b.created_at || 0);
    });
    sortedMsgs.forEach(function(m) { addChatMsg(m.role === 'user' ? 'user' : 'bot', m.content); });
    autoFoldOldDateGroups(area);
    setTimeout(function() { area.scrollTop = area.scrollHeight; }, 150);
    return;
  }
  if (msg.type === 'recognized') { addChatMsg('user', msg.text); return; }
  if (msg.type === 'history') {
    _lastMsgDate = null;
    _currentDateGroup = null;
    var sortedMsgs = msg.messages.sort(function(a, b) {
      return new Date(a.created_at || 0) - new Date(b.created_at || 0);
    });
    sortedMsgs.forEach(function(m) { addChatMsg(m.role === 'user' ? 'user' : 'bot', m.content); });
    var area = document.getElementById('chatArea');
    autoFoldOldDateGroups(area);
    setTimeout(function() { area.scrollTop = area.scrollHeight; }, 150);
    return;
  }
  if (msg.type === 'push') { handlePush(msg); return; }
  if (msg.type === 'reply') { handleReply(msg); return; }
}

function handlePush(msg) {
  var div = addChatMsg('bot', msg.text);
  if (Notification.permission !== 'granted') Notification.requestPermission();
  if (Notification.permission === 'granted') new Notification('灵依推送', {body: msg.text.slice(0,80)});
}

function handleReply(msg) {
  removeTyping();
  var div = addChatMsg('bot', msg.text);
  if (_ttsOn && msg.audio) {
    var audio = document.createElement('audio');
    audio.controls = true; audio.autoplay = true;
    audio.src = 'data:audio/mp3;base64,' + msg.audio;
    div.appendChild(audio);
    audio.play().catch(function(){});
  }
}

function addChatMsg(role, text) {
  var area = document.getElementById('chatArea');
  var now = new Date();
  var currentDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

  // 如果日期变化，创建新的日期组
  if (currentDate !== _lastMsgDate && role !== 'system') {
    var dateDivider = document.createElement('div');
    dateDivider.className = 'date-divider';
    dateDivider.innerHTML = '<span class="date-divider-text">' + formatDateLabel(now) + '</span>';
    dateDivider.onclick = function() {
      var group = dateDivider.nextElementSibling;
      if (group && group.classList.contains('date-group')) {
        group.classList.toggle('collapsed');
        dateDivider.classList.toggle('collapsed');
      }
    };
    area.appendChild(dateDivider);

    _currentDateGroup = document.createElement('div');
    _currentDateGroup.className = 'date-group';
    area.appendChild(_currentDateGroup);

    _lastMsgDate = currentDate;
  }

  // 如果没有当前日期组（比如system消息），创建一个临时的
  var targetGroup = _currentDateGroup;
  if (!targetGroup && role !== 'system') {
    targetGroup = document.createElement('div');
    targetGroup.className = 'date-group';
    area.appendChild(targetGroup);
  }

  var container = document.createElement('div');
  container.className = 'msg-container ' + role;

  var actions = document.createElement('div');
  actions.className = 'msg-actions';
  if (role !== 'system') {
    var collapseBtn = document.createElement('button');
    collapseBtn.className = 'msg-action-btn';
    collapseBtn.innerHTML = '&#8963;';
    collapseBtn.title = '折叠/展开';
    collapseBtn.onclick = function() {
      var msgDiv = container.querySelector('.msg');
      if (msgDiv.classList.contains('collapsed')) {
        msgDiv.classList.remove('collapsed');
        collapseBtn.innerHTML = '&#8963;';
      } else {
        msgDiv.classList.add('collapsed');
        collapseBtn.innerHTML = '&#8964;';
      }
    };
    actions.appendChild(collapseBtn);

    var deleteBtn = document.createElement('button');
    deleteBtn.className = 'msg-action-btn delete';
    deleteBtn.innerHTML = '&#10005;';
    deleteBtn.title = '删除消息';
    deleteBtn.onclick = function() {
      if (confirm('确定要删除这条消息吗？')) {
        container.remove();
        area.scrollTop = area.scrollHeight;
      }
    };
    actions.appendChild(deleteBtn);
  }
  container.appendChild(actions);

  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  container.appendChild(div);

  if (targetGroup) {
    targetGroup.appendChild(container);
  } else {
    area.appendChild(container);
  }
  area.scrollTop = area.scrollHeight;
  return div;
}

function formatDateLabel(date) {
  var now = new Date();
  var today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  var yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  var yesterdayStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');

  var dateStr = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');

  if (dateStr === today) {
    return '今天 ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
  } else if (dateStr === yesterdayStr) {
    return '昨天 ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
  } else {
    var monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
    return date.getDate() + '日 ' + monthNames[date.getMonth()];
  }
}

function showTyping() {
  removeTyping();
  var div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = '<span class="typing">灵依在思考</span>';

function removeTyping() { var el = document.getElementById('typing'); if (el) el.remove(); }

function sendText() {

    ws.send(JSON.stringify({type:'chat', target:'lingyi', text:text}));
  } else {
    ws.send(JSON.stringify(payload));
  }
  showTyping();
  inp.value = '';
}

function sendQuick(text) {
  if (!ws || ws.readyState !== 1) return;
  addChatMsg('user', text);
  if (useBridge) {
    ws.send(JSON.stringify({type:'chat', target:'lingyi', text:text}));
  } else {
    ws.send(JSON.stringify({type:'text', text:text, no_tts: !_ttsOn}));
  }
  showTyping();
  switchPage('Chat');
}

document.getElementById('chatInput').onkeydown = function(e) { if (e.key === 'Enter') sendText(); };

function esc(s) { if (s === null || s === undefined) return ''; try { var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; } catch(e) { return String(s); } }

var _micRecorder = null, _micChunks = [];
function toggleMic() {
  if (_micRecorder && _micRecorder.state === 'recording') {
    _micRecorder.stop();
    return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
    _micChunks = [];
    _micRecorder = new MediaRecorder(stream);
    var btn = document.getElementById('micBtn');
    btn.classList.add('recording');
    _micRecorder.ondataavailable = function(e) { if (e.data.size > 0) _micChunks.push(e.data); };
    _micRecorder.onstop = function() {
      btn.classList.remove('recording');
      stream.getTracks().forEach(function(t){t.stop();});
      var blob = new Blob(_micChunks, {type:'audio/webm'});
      var reader = new FileReader();
      reader.onload = function() {
        var b64 = reader.result.split(',')[1];
        if (ws && ws.readyState === 1 && b64) {
          ws.send(JSON.stringify({type:'audio', data:b64, no_tts: !_ttsOn}));
          showTyping();
        }
      };
      reader.readAsDataURL(blob);
    };
    _micRecorder.start();
  }).catch(function(err) { alert('无法访问麦克风: ' + err.message); });
}

// ── Session Management ───────────────────────────────────────
function autoFoldOldDateGroups(area) {
  var groups = area.querySelectorAll('.date-group');
  if (groups.length <= 1) return;
  for (var i = 0; i < groups.length - 1; i++) {
    groups[i].classList.add('collapsed');
    var divider = groups[i].previousElementSibling;
    if (divider && divider.classList.contains('date-divider')) {
      divider.classList.add('collapsed');
    }
  }
}

async function cleanupSessions() {
  try {
    var r = await authFetch('/api/sessions');
    if (!r) return;
    var sessions = await r.json();
    var empty = sessions.filter(function(s) { return s.session_id !== 'default' && (!s.message_count || s.message_count === 0); });
    if (empty.length === 0) { alert('没有空会话需要清理'); return; }
    if (!confirm('找到 ' + empty.length + ' 个空会话，是否删除？')) return;
    for (var i = 0; i < empty.length; i++) {
      await authFetch('/api/sessions/' + encodeURIComponent(empty[i].session_id), {method: 'DELETE'});
    }
    loadSessions();
  } catch(e) { alert('清理失败: ' + e.message); }
}

function toggleSessionPanel() {
  var panel = document.getElementById('sessionPanel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    loadSessions();
  } else {
    panel.style.display = 'none';
  }
}

function _sessionDateGroup(updated_at) {
  if (!updated_at) return '更早';
  var d = new Date(updated_at);
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var yesterday = new Date(today.getTime() - 86400000);
  var dDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (dDay.getTime() === today.getTime()) return '今天';
  if (dDay.getTime() === yesterday.getTime()) return '昨天';
  if (now - dDay < 7 * 86400000) return '近7天';
  if (now - dDay < 30 * 86400000) return '近30天';
  return '更早';
}

function _isOldGroup(label) {
  return label === '近30天' || label === '更早';
}

function _toggleSessionDateGroup(el) {
  var items = el.nextElementSibling;
  var arrow = el.querySelector('.arrow');
  if (!items) return;
  if (items.classList.contains('collapsed')) {
    items.classList.remove('collapsed');
    items.style.maxHeight = items.scrollHeight + 'px';
    if (arrow) arrow.classList.remove('collapsed');
  } else {
    items.style.maxHeight = items.scrollHeight + 'px';
    requestAnimationFrame(function() { items.classList.add('collapsed'); });
    if (arrow) arrow.classList.add('collapsed');
  }
}

function _renderSessionItem(s) {
  var isActive = s.session_id === _currentSessionId;
  var t = s.updated_at ? s.updated_at.slice(5,16).replace('T',' ') : '';
  var isDefault = s.session_id === 'default';
  var h = '<div class="session-item' + (isActive?' active':'') + '" onclick="switchSession(\'' + esc(s.session_id) + '\')">';
  h += '<span class="session-item-title">' + esc(s.title) + (isDefault?'（默认）':'') + '</span>';
  h += '<span class="session-item-meta">' + s.message_count + ' 条</span>';
  h += '<span class="session-item-meta">' + t + '</span>';
  if (!isDefault) {
    h += '<span class="session-item-del" onclick="event.stopPropagation();deleteSession(\'' + esc(s.session_id) + '\',\'' + esc(s.title).replace(/'/g, "\\'") + '\')">×</span>';
  }
  h += '</div>';
  return h;
}

async function loadSessions() {
  var listEl = document.getElementById('sessionList');
  listEl.innerHTML = '<div class="session-loading">加载中...</div>';
  try {
    var r = await authFetch('/api/sessions');
    if (!r) return;
    var sessions = await r.json();
    var html = '';
    if (sessions.length === 0) {
      html = '<div class="empty">暂无会话</div>';
    } else {
      var groups = {};
      var order = [];
      sessions.forEach(function(s) {
        var label = _sessionDateGroup(s.updated_at);
        if (!groups[label]) { groups[label] = []; order.push(label); }
        groups[label].push(s);
      });
      order.forEach(function(label) {
        var items = groups[label];
        var isOld = _isOldGroup(label);
        html += '<div class="session-date-group">';
        html += '<div class="session-date-label" onclick="_toggleSessionDateGroup(this)">';
        html += '<span class="arrow' + (isOld ? ' collapsed' : '') + '">▼</span>';
        html += '<span>' + esc(label) + '</span>';
        html += '<span style="margin-left:auto;font-size:10px">' + items.length + ' 个</span>';
        html += '</div>';
        html += '<div class="session-date-items' + (isOld ? ' collapsed' : '') + '"' + (isOld ? '' : ' style="max-height:9999px"') + '>';
        items.forEach(function(s) { html += _renderSessionItem(s); });
        html += '</div></div>';
      });
    }
    listEl.innerHTML = html;
    updateSessionTitle();
  } catch(e) {
    listEl.innerHTML = '<div class="empty">加载失败</div>';
  }
}

async function createSession() {
  try {
    var r = await authFetch('/api/sessions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title: '新对话'})
    });
    if (!r) return;
    var data = await r.json();
    if (data.session_id) {
      switchSession(data.session_id);
    }
  } catch(e) {
    alert('创建会话失败: ' + e.message);
  }
}

function switchSession(sessionId) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({type: 'switch_session', session_id: sessionId}));
  }
  _currentSessionId = sessionId;
  loadSessions();
  document.getElementById('chatArea').innerHTML = '';
}

async function deleteSession(sessionId, title) {
  if (sessionId === 'default') {
    alert('默认会话无法删除');
    return;
  }
  if (!confirm('确定要删除会话“' + title + '”吗？此操作不可恢复。')) {
    return;
  }
  try {
    await authFetch('/api/sessions/' + encodeURIComponent(sessionId), {method: 'DELETE'});
    loadSessions();
  } catch(e) {
    alert('删除会话失败: ' + e.message);
  }
}

function updateSessionTitle() {
  var titleEl = document.getElementById('sessionTitle');
  if (!titleEl) return;
  var listEl = document.getElementById('sessionList');
  var items = listEl.querySelectorAll('.session-item');
  for (var i = 0; i < items.length; i++) {
    if (items[i].classList.contains('active')) {
      var titleSpan = items[i].querySelector('.session-item-title');
      if (titleSpan) {
        titleEl.textContent = titleSpan.textContent;
      }
      break;
    }
  }
}

// ── Logs ────────────────────────────────────────────────
function loadLogs() {
  var sel = document.getElementById('logSource');
  var pre = document.getElementById('logContent');
  var source = sel.value || '灵依';
  var errOnly = document.getElementById('logErrorsOnly').checked;
  pre.textContent = '加载中...';
  authFetch('/api/logs?source=' + encodeURIComponent(source) + '&lines=50&errors_only=' + errOnly)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.sources && sel.options.length === 0) {
        data.sources.forEach(function(s) {
          var opt = document.createElement('option');
          opt.value = s; opt.textContent = s;
          sel.appendChild(opt);
        });
        sel.value = source;
      }
      pre.textContent = data.lines && data.lines.length ? data.lines.join('') : '(无日志)';
      pre.scrollTop = pre.scrollHeight;
    })
    .catch(function(e) { pre.textContent = '加载失败: ' + e.message; });
}

// ── Clock ───────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var el = document.getElementById('headerTime');
  if (el) el.textContent = h + ':' + m;
}
setInterval(updateClock, 30000); updateClock();

// ── Models ──────────────────────────────────────────────
var _modelTimer = null;
function loadModels() {
  authFetch('/api/models')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var cards = document.getElementById('modelCards');
      var banner = document.getElementById('modelResetBanner');
      var html = '';
      var keys = Object.keys(data).filter(function(k) { return k !== '_meta'; });
      keys.forEach(function(modelName) {
        var m = data[modelName];
        var exhausted = m.state === 'exhausted';
        var statusColor = exhausted ? '#e74c3c' : '#27ae60';
        var statusText = exhausted ? '配额耗尽' : '可用';
        var statusIcon = exhausted ? '\u274c' : '\u2705';
        html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center">';
        html += '<div style="font-weight:700;font-size:15px">' + esc(modelName) + '</div>';
        html += '<div style="font-size:12px;padding:3px 8px;border-radius:12px;color:#fff;background:' + statusColor + '">' + statusIcon + ' ' + statusText + '</div>';
        html += '</div>';
        if (exhausted && m.resets_in) {
          html += '<div style="font-size:12px;color:#e67e22;margin-top:6px">\u23f3 ' + esc(m.resets_in) + '后重置</div>';
        }
        html += '</div>';
      });
      cards.innerHTML = html;
      if (data._meta && data._meta.next_reset) {
        banner.style.display = 'block';
        banner.dataset.sec = String(data._meta.seconds_to_reset || 0);
        var sec = data._meta.seconds_to_reset || 0;
        var min = Math.floor(sec / 60);
        var hh = Math.floor(min / 60);
        var mm = min % 60;
        banner.innerHTML = '\u23f3 <b>下次配额重置</b>: ' + data._meta.next_reset + ' (约 ' + hh + '小时' + mm + '分钟后)';
      } else {
        banner.style.display = 'none';
      }
      if (_modelTimer) clearInterval(_modelTimer);
      _modelTimer = setInterval(function() {
        var b = document.getElementById('modelResetBanner');
        if (!b || !b.dataset.sec) return;
        var s = parseInt(b.dataset.sec) - 60;
        if (s <= 0) { clearInterval(_modelTimer); loadModels(); return; }
        b.dataset.sec = String(s);
        var m2 = Math.floor(s/60), h2 = Math.floor(m2/60), m3 = m2%60;
        b.innerHTML = b.innerHTML.replace(/约 \d+小时\d+分钟后/, '约 ' + h2 + '小时' + m3 + '分钟后');
      }, 60000);
      loadUsage();
    })
    .catch(function(e) { document.getElementById('modelCards').innerHTML = '<div style="color:var(--dim)">加载失败: ' + esc(e.message) + '</div>'; });
}
function probeModels() {
  var btn = document.getElementById('probeBtn');
  var result = document.getElementById('probeResult');
  btn.disabled = true; btn.textContent = '探测中...';
  result.style.display = 'block'; result.textContent = '正在测试全部模型可用性...';
  authFetch('/api/models?action=probe', {method: 'POST'})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var html = '<div style="font-weight:700;margin-bottom:8px">探测结果</div>';
      (data.results || []).forEach(function(r) {
        var c = r.available ? '#27ae60' : '#e74c3c';
        html += '<div style="margin:4px 0">' + (r.available?'\u2705':'\u274c') + ' <b>' + esc(r.model) + '</b> — <span style="color:' + c + '">' + (r.available ? '可用' : esc(r.reason||'不可用')) + '</span></div>';
      });
      result.innerHTML = html;
      btn.disabled = false; btn.textContent = '探测全部模型';
      loadModels();
    })
    .catch(function(e) {
      result.textContent = '探测失败: ' + e.message;
      btn.disabled = false; btn.textContent = '探测全部模型';
    });
}
function loadUsage() {
  authFetch('/api/usage')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var section = document.getElementById('usageSection');
      var summary = document.getElementById('usageSummary');
      var byModel = document.getElementById('usageByModel');
      var w = data.current_window || {};
      if (!w.total_calls) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      summary.innerHTML = '共 <b>' + w.total_calls + '</b> 次调用, <b>' + (w.total_tokens || 0).toLocaleString() + '</b> tokens | 重置于 ' + esc(w.resets_at || '?');
      var html = '<table style="width:100%;border-collapse:collapse;font-size:13px">';
      html += '<tr style="border-bottom:1px solid var(--border);color:var(--dim)"><th style="text-align:left;padding:4px 8px">模型</th><th style="text-align:right;padding:4px 8px">调用次数</th><th style="text-align:right;padding:4px 8px">输入</th><th style="text-align:right;padding:4px 8px">输出</th><th style="text-align:right;padding:4px 8px">总计</th></tr>';
      var models = w.models || {};
      Object.keys(models).forEach(function(name) {
        var m = models[name];
        html += '<tr style="border-bottom:1px solid var(--border)">';
        html += '<td style="padding:4px 8px">' + esc(name) + '</td>';
        html += '<td style="text-align:right;padding:4px 8px">' + m.calls + '</td>';
        html += '<td style="text-align:right;padding:4px 8px">' + (m.prompt_tokens || 0).toLocaleString() + '</td>';
        html += '<td style="text-align:right;padding:4px 8px">' + (m.completion_tokens || 0).toLocaleString() + '</td>';
        html += '<td style="text-align:right;padding:4px 8px">' + (m.total_tokens || 0).toLocaleString() + '</td>';
        html += '</tr>';
      });
      html += '</table>';
      byModel.innerHTML = html;
    })
    .catch(function() {});
}

// ── Init ────────────────────────────────────────────────
try { loadDashboard(); } catch(e) { console.error('loadDashboard init error:', e); }
try { connectWS(); } catch(e) { console.error('connectWS init error:', e); }

</script>
