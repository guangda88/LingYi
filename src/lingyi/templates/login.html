<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵依 — 登录</title>
<style>
:root {
  --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a4a;
  --text: #e0e0e0; --dim: #888; --accent: #e94560;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; }
.login-box { width:280px; text-align:center; }
.login-box h1 { font-size:24px; color:var(--accent); margin-bottom:8px; }
.login-box p { font-size:13px; color:var(--dim); margin-bottom:24px; }
.login-box input[type="password"] { width:100%; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border); background:var(--card); color:var(--text); font-size:16px; outline:none; text-align:center; letter-spacing:2px; }
.login-box input[type="password"]:focus { border-color:var(--accent); }
.login-box button { width:100%; margin-top:12px; padding:12px; border-radius:var(--radius); border:none; background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
.login-box button:active { opacity:.8; }
.login-error { color:var(--accent); font-size:13px; margin-top:12px; min-height:20px; }
.remember-row { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:10px; font-size:13px; color:var(--dim); cursor:pointer; user-select:none; }
.remember-row input[type="checkbox"] { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; }
</style>
</head>
<body>
<div class="login-box">
  <h1>灵依</h1>
  <p>私人助理 · 请输入密码</p>
  <input type="password" id="pwdInput" placeholder="密码" autofocus>
  <label class="remember-row">
    <input type="checkbox" id="rememberMe" checked>
    <span>记住登录（30天免密码）</span>
  </label>
  <button onclick="doLogin()">进入</button>
  <div class="login-error" id="errMsg"></div>
</div>
<script>
document.getElementById('pwdInput').onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };
async function doLogin() {
  var pwd = document.getElementById('pwdInput').value;
  if (!pwd) return;
  var remember = document.getElementById('rememberMe').checked;
  try {
    var r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd, remember:remember})});
    var d = await r.json();
    if (d.ok) { location.href = '/'; }
    else { document.getElementById('errMsg').textContent = d.error || '密码错误'; }
  } catch(e) {
    document.getElementById('errMsg').textContent = '连接失败';
  }
}
</script>
</body>
</html>
